name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: |
          pip install ruff
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Python lint (ruff)
        run: ruff check build.py tests/

      - name: CSS lint (stylelint)
        run: stylelint style.css

      - name: JS syntax check
        run: node --check app.js

      - name: HTML lint (generated pages)
        run: |
          python3 build.py
          htmlhint index.html docs/*.html

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: python3 -m pytest tests/test_build.py -v

      - name: Verify build generates all expected files
        run: |
          python3 build.py
          test -f index.html
          test -f sitemap.xml
          test -f robots.txt
          test -d docs
          PAGE_COUNT=$(ls docs/*.html | wc -l)
          echo "Generated $PAGE_COUNT pages"
          if [ "$PAGE_COUNT" -lt 40 ]; then
            echo "ERROR: Expected at least 40 pages, got $PAGE_COUNT"
            exit 1
          fi

  visual-tests:
    name: Visual & UI Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site
        run: python3 build.py

      - name: Install dependencies
        run: |
          npm install
          npm install -g serve
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=list

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site
        run: python3 build.py

      - name: Install serve
        run: npm install -g serve

      - name: Check internal links
        run: |
          serve . -l 3000 --no-clipboard --no-request-logging &
          SERVER_PID=$!
          sleep 2

          ERRORS=0
          for page in index.html docs/*.html; do
            grep -oP 'href="(\./[^"]*|\.\.\/[^"]*|[^"]*\.html)"' "$page" | \
              sed 's/href="//;s/"$//' | \
              sort -u | while read -r link; do
                if echo "$page" | grep -q "docs/"; then
                  RESOLVED=$(cd docs && realpath --relative-to=. "$link" 2>/dev/null || echo "$link")
                  URL="http://127.0.0.1:3000/docs/$RESOLVED"
                else
                  RESOLVED=$(realpath --relative-to=. "$link" 2>/dev/null || echo "$link")
                  URL="http://127.0.0.1:3000/$RESOLVED"
                fi
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null)
                if [ "$STATUS" = "404" ]; then
                  echo "BROKEN: $page -> $link (404)"
                  ERRORS=$((ERRORS + 1))
                fi
              done
          done

          kill $SERVER_PID 2>/dev/null
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS broken internal links"
            exit 1
          fi
          echo "All internal links OK"
