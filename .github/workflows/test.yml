name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run build.py unit tests
        run: python3 -m pytest tests/test_build.py -v

      - name: Verify build.py generates pages
        run: |
          python3 build.py
          # Verify expected files exist
          test -f index.html
          test -f sitemap.xml
          test -f robots.txt
          test -d docs
          ls docs/*.html | wc -l | grep -q '[0-9]'

  visual-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install -g serve
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=list

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
